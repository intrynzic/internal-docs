site_name: IntricateDocs
site_url: https://intrynzic.github.io/IntricateDocs/

theme:
  name: material
  language: en

  font:
    text: Inter
    code: Consolas

  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: cyan

    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: cyan

plugins:
  - search
  - social

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/intrynzic

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Project:
    - Overview: project/index.md
    - Build Configurations: project/build-configurations.md
    - IDE Requirements: project/ide-requirements.md
    - Setup Guide: project/setup.md
    - System Requirements: project/system-requirements.md
  - Style:
    - Overview: style/index.md
    - C++ Style Guide: style/cpp-style.md
    - C# Style Guide: style/csharp-style.md
    - Commenting Conventions: style/comments.md
    - Naming Conventions: style/naming-conventions.md
  - Tooling:
    - Overview: tooling/index.md
    - Bindings Generator: tooling/bindings-generator.md

copyright: |
  &copy; 2026-present <a href="https://github.com/intrynzic" target="_blank" rel="noopener">Intrynzic Software</a>
